version: '3.8'

services:
  live-coding-music-mcp:
    build: .
    container_name: live-coding-music-mcp
    environment:
      - NODE_ENV=production
      - DEBUG=false
    volumes:
      - ./patterns:/app/patterns
      - ./config.json:/app/config.json:ro
    stdin_open: true
    tty: true

  live-coding-music-mcp-dev:
    build:
      context: .
      target: builder
    container_name: live-coding-music-mcp-dev
    environment:
      - NODE_ENV=development
      - DEBUG=true
    volumes:
      - ./src:/app/src
      - ./patterns:/app/patterns
      - ./config.json:/app/config.json:ro
    command: npm run dev
    stdin_open: true
    tty: true
